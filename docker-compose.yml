version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: ai-list-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_list}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=500
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./app/sql/create_tables.sql:/docker-entrypoint-initdb.d/01_create_tables.sql:ro
      - ./app/sql/insert_data.sql:/docker-entrypoint-initdb.d/02_insert_data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: ai-list-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 20

  embedding:
    image: ${EMBEDDING_IMAGE:-ghcr.io/huggingface/text-embeddings-inference:cpu-latest}
    container_name: ai-list-embedding
    restart: unless-stopped
    ports:
      - "${EMBEDDING_PORT:-8080}:80"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MODEL_ID: ${EMBEDDING_MODEL_ID:-BAAI/bge-m3}
    command:
      - --model-id
      - ${EMBEDDING_MODEL_ID:-BAAI/bge-m3}
    volumes:
      - embedding_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
  redis_data:
  embedding_data:
